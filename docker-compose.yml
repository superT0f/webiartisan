version: "3.8"

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./sites/api:/var/www/api:ro
    depends_on:
      php:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - webiartisan
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    volumes:
      - ./sites/api:/var/www/api
    environment:
      DB_HOST: mysql
      DB_NAME: webiartisan
      DB_USER: webiartisan
      DB_PASS: webiartisan_dev
    networks:
      - webiartisan
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x 'php-fpm' || pgrep -x 'php-fpm8.4' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: webiartisan
      MYSQL_USER: webiartisan
      MYSQL_PASSWORD: webiartisan_dev
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sites/api/migrations/025_artisans_local.sql:/docker-entrypoint-initdb.d/025_artisans_local.sql:ro
      - ./sites/api/migrations/026_b2b_recipes.sql:/docker-entrypoint-initdb.d/026_b2b_recipes.sql:ro
      - ./sites/api/migrations/027_spin_wheel.sql:/docker-entrypoint-initdb.d/027_spin_wheel.sql:ro
      - ./sites/api/migrations/028_gamification.sql:/docker-entrypoint-initdb.d/028_gamification.sql:ro
      - ./sites/api/migrations/029_testimonials_services.sql:/docker-entrypoint-initdb.d/029_testimonials_services.sql:ro
      - ./sites/api/migrations/030_mini_games.sql:/docker-entrypoint-initdb.d/030_mini_games.sql:ro
      - ./sites/api/migrations/031_email_queue.sql:/docker-entrypoint-initdb.d/031_email_queue.sql:ro
      - ./sites/api/migrations/032_user_password_auth.sql:/docker-entrypoint-initdb.d/032_user_password_auth.sql:ro
      - ./sites/api/migrations/033_artisan_premium.sql:/docker-entrypoint-initdb.d/033_artisan_premium.sql:ro
      - ./sites/api/migrations/039_checkins_game_types.sql:/docker-entrypoint-initdb.d/039_checkins_game_types.sql:ro
      - ./data/seeds/livry.sql:/docker-entrypoint-initdb.d/livry.sql:ro
      - ./data/seeds/livry_prospects.sql:/docker-entrypoint-initdb.d/livry_prospects.sql:ro
      - ./data/seeds/livry_recipes.sql:/docker-entrypoint-initdb.d/livry_recipes.sql:ro
    # Port 3306 is only exposed internally; remove host binding for security.
    # Use `docker compose port mysql 3306` or an override file if local access is needed.
    networks:
      - webiartisan
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "webiartisan", "-pwebiartisan_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  node:
    image: node:20-alpine
    working_dir: /app/sites/webiartisan-livry
    volumes:
      - .:/app
    ports:
      - "5173:5173"
    command: ["sh", "-c", "cd /app/sites/artisans-shared && npm install && cd /app/sites/webiartisan-livry && npm install && npm run dev -- --host"]
    networks:
      - webiartisan

volumes:
  mysql_data:

networks:
  webiartisan:
