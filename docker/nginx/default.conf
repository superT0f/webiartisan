server {
    listen 80;
    server_name localhost;
    root /var/www/api;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location /avatars/ {
        alias /var/www/api/public/avatars/;
        expires 30d;
    }

    location /uploads/ {
        alias /var/www/api/uploads/;
        expires 30d;
        location ~ \.php$ {
            return 403;
        }
    }

    location ~ \.php$ {
        # Use a variable so nginx resolves the PHP host at request time rather
        # than at startup. This prevents startup failures when the php container
        # is not yet in Docker DNS (depends_on only orders creation, not readiness).
        resolver 127.0.0.11 valid=10s;
        set $php_upstream php:9000;
        fastcgi_pass $php_upstream;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
}
