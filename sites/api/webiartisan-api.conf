<VirtualHost *:80>
    ServerName localhost

    DocumentRoot /var/www/html

    # API sous /api/
    Alias /api /home/tof/project/webiartisan/api
    <Directory /home/tof/project/webiartisan/api>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/webiartisan-error.log
    CustomLog ${APACHE_LOG_DIR}/webiartisan-access.log combined
</VirtualHost>
