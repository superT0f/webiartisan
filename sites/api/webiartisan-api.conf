<VirtualHost *:80>
    ServerName localhost

    DocumentRoot /var/www/html

    # Deployers: set API_ROOT to the directory containing the project checkout.
    # The paths below assume the project lives at /home/tof/project/webiartisan.
    Define API_ROOT /home/tof/project/webiartisan

    # API sous /api/
    Alias /api ${API_ROOT}/api
    <Directory ${API_ROOT}/api>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Uploads d'avatars
    Alias /uploads ${API_ROOT}/api/uploads
    <Directory ${API_ROOT}/api/uploads>
        Options -Indexes
        Require all granted
        php_admin_flag engine off
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/webiartisan-error.log
    CustomLog ${APACHE_LOG_DIR}/webiartisan-access.log combined
</VirtualHost>
