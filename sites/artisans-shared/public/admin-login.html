<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion admin — WebIArtisan</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f4f0;
      color: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      text-align: center;
    }
    h1 { margin: 0 0 8px; font-size: 1.5rem; }
    p { margin: 0 0 24px; color: #666; font-size: 0.95rem; }
    .form-group { text-align: left; margin-bottom: 20px; }
    label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; color: #444; }
    input, textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: monospace;
    }
    textarea { min-height: 100px; resize: vertical; }
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #1a1a2e;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #2a2a4e; }
    .message { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 0.9rem; }
    .message.error { background: #ffebee; color: #b71c1c; }
    .message.success { background: #e8f5e9; color: #1b5e20; }
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔐 Connexion admin</h1>
    <p>Accès rapide à l’espace d’administration.</p>

    <form id="login-form">
      <div class="form-group">
        <label for="token">Token admin</label>
        <textarea id="token" placeholder="Collez le token admin ici…" required></textarea>
      </div>
      <button type="submit" id="submit-btn">Ouvrir l’administration</button>
    </form>

    <div id="message"></div>
  </div>

  <script>
    const TOKEN_KEY = 'artisan_token'
    const TARGET_PATH = '/espace/admin/comptes'

    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search)
      return params.get(name)
    }

    function setMessage(text, type) {
      const el = document.getElementById('message')
      el.textContent = text
      el.className = 'message ' + (type || '')
    }

    function login(token) {
      if (!token || token.length < 10) {
        setMessage('Token invalide ou trop court.', 'error')
        return false
      }
      try {
        localStorage.setItem(TOKEN_KEY, token)
        setMessage('Authentification enregistrée. Redirection…', 'success')
        setTimeout(() => {
          window.location.href = TARGET_PATH
        }, 400)
        return true
      } catch (e) {
        setMessage('Impossible d’écrire dans le stockage local.', 'error')
        return false
      }
    }

    // Auto-login si ?token=... est présent dans l’URL
    const urlToken = getQueryParam('token')
    if (urlToken) {
      document.getElementById('token').value = urlToken
      const btn = document.getElementById('submit-btn')
      btn.innerHTML = '<span class="spinner"></span> Connexion…'
      btn.disabled = true
      login(urlToken)
    }

    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault()
      const token = document.getElementById('token').value.trim()
      login(token)
    })
  </script>
</body>
</html>
