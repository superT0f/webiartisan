<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <defs>
    <linearGradient id="gradBread" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D9A45B"/>
      <stop offset="1" stop-color="#B5712B"/>
    </linearGradient>
  </defs>

  <!-- Symbole : baguette dorée, grignes tricolores discrètes -->
  <g transform="translate(170,190) rotate(-35)">
    <rect x="-56" y="-15" width="112" height="30" rx="15" fill="url(#gradBread)"/>
    <rect x="-30.5" y="-11" width="5" height="22" rx="2.5" fill="#2F4E8C" transform="rotate(28 -28 0)"/>
    <rect x="-2.5"  y="-11" width="5" height="22" rx="2.5" fill="#F5F0E6" transform="rotate(28 0 0)"/>
    <rect x="25.5"  y="-11" width="5" height="22" rx="2.5" fill="#C8433C" transform="rotate(28 28 0)"/>
  </g>

  <!-- Wordmark -->
  <text x="300" y="205" font-family="Outfit, Inter, sans-serif" font-weight="800" font-size="78" letter-spacing="-2">
    <tspan fill="#C07A2E">Webi</tspan><tspan fill="#2B2118">Artisan</tspan>
  </text>
  <text x="303" y="250" font-family="Outfit, Inter, sans-serif" font-weight="500" font-size="24" fill="#6B5D4F">L&#8217;annuaire libre des artisans de proximité</text>

  <!-- Badge confiance (GATED : voir note en tête de tâche) -->
  <g transform="translate(303,285)">
    <rect x="0" y="0" width="10" height="14" rx="1" fill="#2F4E8C"/>
    <rect x="10" y="0" width="10" height="14" rx="0" fill="#F5F0E6" stroke="#E2D9C8" stroke-width="0.5"/>
    <rect x="20" y="0" width="10" height="14" rx="1" fill="#C8433C"/>
    <text x="38" y="12" font-family="Outfit, Inter, sans-serif" font-weight="600" font-size="15" fill="#6B5D4F">Conçu en France</text>
  </g>
</svg>
