<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360">
  <defs>
    <linearGradient id="gradBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2E6BFF"/>
      <stop offset="1" stop-color="#1B4FDB"/>
    </linearGradient>
  </defs>
  <rect width="900" height="360" fill="#FFFFFF"/>

  <!-- Symbole : baguette géométrique -->
  <g transform="translate(170,180) rotate(-35)">
    <rect x="-52" y="-14" width="104" height="28" rx="14" fill="url(#gradBlue)"/>
    <rect x="-28.5" y="-10.5" width="5" height="21" rx="2.5" fill="#FEF8EC" transform="rotate(28 -26 0)"/>
    <rect x="-2.5"  y="-10.5" width="5" height="21" rx="2.5" fill="#EF4135" transform="rotate(28 0 0)"/>
    <rect x="23.5"  y="-10.5" width="5" height="21" rx="2.5" fill="#FEF8EC" transform="rotate(28 26 0)"/>
  </g>

  <!-- Wordmark -->
  <text x="300" y="200" font-family="Inter" font-weight="800" font-size="78" letter-spacing="-2">
    <tspan fill="#1B4FDB">Webi</tspan><tspan fill="#141B34">Artisan</tspan>
  </text>
  <text x="303" y="245" font-family="Inter" font-weight="500" font-size="24" fill="#6B7280">L&#8217;artisanat local, propulsé par le web</text>
</svg>
