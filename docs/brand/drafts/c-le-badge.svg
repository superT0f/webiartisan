<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360">
  <defs>
    <linearGradient id="gradBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2E6BFF"/>
      <stop offset="1" stop-color="#1B4FDB"/>
    </linearGradient>
  </defs>
  <rect width="900" height="360" fill="#FFFFFF"/>

  <!-- Hexagone -->
  <polygon points="170,50 278.3,112.5 278.3,237.5 170,300 61.7,237.5 61.7,112.5"
           fill="#FFFFFF" stroke="url(#gradBlue)" stroke-width="12" stroke-linejoin="round"/>

  <!-- Circuits -->
  <g stroke="#2E6BFF" stroke-width="4" fill="none" stroke-linecap="round">
    <polyline points="138,148 108,108"/>
    <polyline points="202,202 230,242"/>
  </g>
  <circle cx="108" cy="108" r="6" fill="#2E6BFF"/>
  <circle cx="230" cy="242" r="6" fill="#EF4135"/>

  <!-- Baguette -->
  <g transform="translate(170,175) rotate(-35)">
    <rect x="-44" y="-12" width="88" height="24" rx="12" fill="url(#gradBlue)"/>
    <rect x="-23.5" y="-8" width="5" height="16" rx="2.5" fill="#FEF8EC" transform="rotate(18 -21 0)"/>
    <rect x="-2.5"  y="-8" width="5" height="16" rx="2.5" fill="#EF4135" transform="rotate(18 0 0)"/>
    <rect x="18.5"  y="-8" width="5" height="16" rx="2.5" fill="#FEF8EC" transform="rotate(18 21 0)"/>
  </g>

  <!-- Wordmark -->
  <text x="330" y="190" font-family="Inter" font-weight="800" font-size="66" letter-spacing="-2">
    <tspan fill="#1B4FDB">Webi</tspan><tspan fill="#141B34">Artisan</tspan>
  </text>
  <text x="332" y="228" font-family="Inter" font-weight="500" font-size="21" fill="#6B7280">L&#8217;artisanat local, propulsé par le web</text>
</svg>
